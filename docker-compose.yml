version: '3.8'

services:
  # Frontend Next.js
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      # URL ini digunakan oleh browser, jadi pakai localhost
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    restart: always

  postgres:
    image: postgres:15-alpine
    container_name: ticketing_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tekino2026
      POSTGRES_DB: ticketing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: ticketing_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:tekino2026@postgres:5432/ticketing?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/prisma:/app/prisma
      - ./backend/main.py:/app/main.py
    command: >
      sh -c "
        sleep 5 &&
        prisma db push --accept-data-loss &&
        uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      "

volumes:
  postgres_data:

networks:
  default:
    name: hub-network
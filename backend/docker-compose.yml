services:
  postgres:
    image: postgres:15-alpine
    container_name: ticketing_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tekino2026
      POSTGRES_DB: ticketing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: ticketing_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:tekino2026@postgres:5432/ticketing?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./prisma:/app/prisma
      - ./main.py:/app/main.py
    command: >
      sh -c "
        sleep 5 &&
        prisma db push --accept-data-loss &&
        uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      "

volumes:
  postgres_data:
